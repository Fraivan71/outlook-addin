<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
</head>
<body>
<script>
Office.onReady(() => {
  forwardMail();
});

function forwardMail() {
  const destinatario = "destinatario@azienda.com";
  const testo = "<p>Testo predefinito inserito automaticamente.</p>";

  Office.context.mailbox.item.forwardAsync(
    destinatario,
    { htmlBody: testo },
    function (result) {
      if (result.status !== Office.AsyncResultStatus.Succeeded) {
        console.log(result.error.message);
      }
    }
  );
}
</script>
</body>
</html>
